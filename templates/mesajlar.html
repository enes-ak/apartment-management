{% extends "base.html" %}

{% block title %}Mesaj Hazirla - Apartman Yonetimi{% endblock %}

{% block content %}
<h1 class="mb-4"><i class="bi bi-chat-dots"></i> Mesaj Hazirla</h1>

<div class="card mb-4">
    <div class="card-body">
        <div class="row g-3 align-items-end">
            <div class="col-auto">
                <label for="ay-sec" class="form-label">Ay</label>
                <select id="ay-sec" class="form-select">
                    {% for num, isim in ay_isimleri.items() %}
                    <option value="{{ num }}" {% if num == ay %}selected{% endif %}>{{ isim }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-auto">
                <label for="yil-sec" class="form-label">Yil</label>
                <select id="yil-sec" class="form-select">
                    {% for y in range(yil - 2, yil + 2) %}
                    <option value="{{ y }}" {% if y == yil %}selected{% endif %}>{{ y }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-auto">
                <button class="btn btn-warning"
                        onclick="this.setAttribute('hx-get', '/mesajlar/olustur?yil=' + document.getElementById('yil-sec').value + '&ay=' + document.getElementById('ay-sec').value + '&tur=odemeyenler'); htmx.process(this); htmx.trigger(this, 'click')"
                        hx-target="#mesaj-sonuc"
                        hx-swap="innerHTML">
                    <i class="bi bi-exclamation-triangle"></i> Odemeyenlere Mesaj
                </button>
            </div>
            <div class="col-auto">
                <button class="btn btn-info"
                        onclick="this.setAttribute('hx-get', '/mesajlar/olustur?yil=' + document.getElementById('yil-sec').value + '&ay=' + document.getElementById('ay-sec').value + '&tur=genel'); htmx.process(this); htmx.trigger(this, 'click')"
                        hx-target="#mesaj-sonuc"
                        hx-swap="innerHTML">
                    <i class="bi bi-megaphone"></i> Genel Hatirlatma
                </button>
            </div>
        </div>
    </div>
</div>

<div id="mesaj-sonuc">
    <p class="text-muted">Mesaj olusturmak icin yukaridaki butonlardan birini secin.</p>
</div>
{% endblock %}
